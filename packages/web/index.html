<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outreach Tool</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <nav id="sidebar">
        <div class="nav-brand">Outreach Tool</div>
        <a href="#/" class="nav-link active" data-view="dashboard">Dashboard</a>
        <a href="#/prospects" class="nav-link" data-view="prospects">Prospects</a>
        <a href="#/outreach" class="nav-link" data-view="outreach">Outreach</a>
        <a href="#/bookings" class="nav-link" data-view="bookings">Bookings</a>
        <a href="#/runs" class="nav-link" data-view="runs">Pipeline Runs</a>
        <a href="#/settings" class="nav-link" data-view="settings">Settings</a>
        <a href="#/tools" class="nav-link" data-view="tools">Tools</a>
        <div class="nav-footer">
          <div class="nav-status"><span class="dot dot-green"></span> Groq connected</div>
          <div class="nav-meta">openai/gpt-oss-120b</div>
          <div class="nav-meta">US / UK / UAE</div>
        </div>
      </nav>
      <main class="main-shell" id="main-shell">
        <div id="pipeline-progress-ui" class="pipeline-progress-ui hidden" role="status" aria-live="polite">
          <span class="pipeline-progress-indicator" aria-hidden="true"></span>
          <span class="pipeline-progress-text"></span>
        </div>
        <div id="main-content"></div>
      </main>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <div id="prospect-modal" class="modal hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
