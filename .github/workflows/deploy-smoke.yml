# Manual post-deploy verification against a live Lambda Function URL.
# Repo Settings → Secrets → add LAMBDA_FUNCTION_URL (https://…lambda-url….on.aws, no trailing slash).

name: Deploy smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify deployed API
        env:
          BASE_URL: ${{ secrets.LAMBDA_FUNCTION_URL }}
        run: node scripts/verify-deploy.mjs
